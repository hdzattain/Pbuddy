name: Auto Review & Merge

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # 代码质量审查
  code-review:
    name: Automated Code Review
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terminal-buddy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run linting
        run: ruff check terminal_buddy/

      - name: Check import consistency
        run: |
          python -c "
          from terminal_buddy.pet import Pet
          from terminal_buddy.rarity import calculate_rarity
          from terminal_buddy.breakthrough import can_breakthrough
          from terminal_buddy.travel import start_travel
          from terminal_buddy.actions import PetActions
          from terminal_buddy.storage import PetStorage
          from terminal_buddy.ticker import Ticker
          from terminal_buddy.evolution import EvolutionSystem
          print('All module imports OK')
          "

      - name: Verify backward compatibility
        run: |
          python -c "
          from terminal_buddy.pet import Pet
          old_data = {'name': 'OldPet', 'species': 'blob', 'level': 5}
          pet = Pet.from_dict(old_data)
          assert pet.name == 'OldPet'
          assert pet.rarity == 1
          assert pet.phase == 1
          assert pet.travel_atlas == {}
          data = pet.to_dict()
          assert 'rarity' in data
          assert 'phase' in data
          assert 'travel_atlas' in data
          print('Backward compatibility check PASSED')
          "

      - name: Post review summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
            });

            const jobs = checks.check_runs.filter(r => r.name.includes('Code Review'));
            const allPassed = jobs.every(j => j.conclusion === 'success');

            const body = allPassed
              ? '## Automated Code Review Report\n\n' +
                'All checks passed:\n' +
                '- Unit tests: PASSED\n' +
                '- Linting: PASSED\n' +
                '- Import consistency: PASSED\n' +
                '- Backward compatibility: PASSED\n\n' +
                'This PR is approved for auto-merge.'
              : '## Automated Code Review Report\n\n' +
                'Some checks failed. Please review the workflow logs for details.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body,
            });

  # 自动合入
  auto-merge:
    name: Auto Merge
    needs: [code-review]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // Approve the PR
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: 'Automated review passed. All checks are green. Approving for merge.',
            });

            // Merge the PR
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
                commit_title: `${pr.title} (#${pr.number})`,
                commit_message: pr.body || '',
              });
              console.log(`PR #${pr.number} merged successfully`);
            } catch (error) {
              console.log(`Auto-merge failed: ${error.message}`);
              // Post a comment about merge failure
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `Auto-merge failed: ${error.message}\n\nPlease merge manually.`,
              });
            }
